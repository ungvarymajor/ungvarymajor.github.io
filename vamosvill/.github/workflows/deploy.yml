name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:pages

      - name: Verify Pages artifact
        run: |
          test -f dist/client/index.html || (echo "Missing index.html" && exit 1)
          test -f dist/client/404.html || (echo "Missing 404.html" && exit 1)
          test -f dist/client/.nojekyll || (echo "Missing .nojekyll" && exit 1)
          test -d dist/client/assets || (echo "Missing assets/" && exit 1)
          echo "Pages artifact OK:"
          ls -la dist/client

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
